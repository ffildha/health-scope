{% extends 'base.html' %}

{% block title %}Add New Admin - Admin{% endblock %}

{% block content %}
<div class="text-center mb-4">
    <div class="d-inline-flex align-items-center justify-content-center bg-secondary-light text-secondary rounded-circle mb-3 shadow-sm"
        style="width: 64px; height: 64px;">
        <i class="bi bi-shield-plus fs-2"></i>
    </div>
    <h4 class="page-title mb-1">Add New Administrator</h4>
    <p class="text-muted" style="font-size: 14px;">Grant administrative privileges</p>
</div>

<form method="POST" action="{{ url_for('admin_add_admin') }}">
    <div class="mb-3">
        <label for="name" class="form-label">Admin Full Name</label>
        <div class="input-group">
            <span class="input-group-text bg-light border-end-0 px-3" style="border-radius: 12px 0 0 12px;"><i class="bi bi-person text-muted"></i></span>
            <input type="text" class="form-control border-start-0 ps-1" id="name" name="name" placeholder="Full name of admin" required>
        </div>
    </div>

    <div class="mb-3">
        <label for="email" class="form-label">Professional Email</label>
        <div class="input-group">
            <span class="input-group-text bg-light border-end-0 px-3" style="border-radius: 12px 0 0 12px;"><i class="bi bi-envelope-at text-muted"></i></span>
            <input type="email" class="form-control border-start-0 ps-1" id="email" name="email" placeholder="admin@healthscope.com" required>
        </div>
    </div>

    <div class="mb-4">
        <label for="password" class="form-label">Admin Security Password</label>
        <div class="input-group">
            <span class="input-group-text bg-light border-end-0 px-3" style="border-radius: 12px 0 0 12px;"><i class="bi bi-lock text-muted"></i></span>
            <input type="password" class="form-control border-start-0 ps-1 password-input" id="password" name="password" placeholder="Create a strong password" required>
            <span class="input-group-text toggle-password bg-white cursor-pointer px-3" style="border-radius: 0 12px 12px 0;"><i class="bi bi-eye text-muted"></i></span>
        </div>
    </div>

    <button type="submit" class="btn btn-secondary w-100 py-3 mb-3 fw-bold shadow-sm">
        Grant Admin Access <i class="bi bi-shield-check ms-1"></i>
    </button>
    <a href="{{ url_for('admin_admins') }}" class="btn btn-outline-secondary w-100 py-3 fw-bold">Cancel</a>
</form>

<style>
    .bg-secondary-light {
        background-color: #f8fafc;
    }
</style>
{% endblock %}
