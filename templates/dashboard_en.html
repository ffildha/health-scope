{% extends 'base.html' %}

{% block title %}Dashboard - HEALTHSCOPE{% endblock %}

{% block content %}
<div class="text-center py-3">
    <div class="mb-4">
        <div class="d-inline-flex align-items-center justify-content-center bg-light text-primary rounded-circle shadow-sm"
            style="width: 64px; height: 64px;">
            <i class="bi bi-shield-check fs-2"></i>
        </div>
    </div>
    <h3 class="mb-2" style="font-weight: 700; color: #1e293b;">Welcome</h3>

    <p class="text-muted mb-5" style="font-size: 16px;">Hello <strong style="color: var(--primary-color);">{{ name
            }}</strong>,<br>You have successfully authenticated.</p>

    <div class="d-grid gap-3 mb-5">
        <a href="{{ url_for('symptom_en') }}"
            class="btn btn-primary d-flex align-items-center justify-content-center py-3 shadow-sm"
            style="font-weight: 600; font-size: 15px; border-radius: 12px;">
            <i class="bi bi-file-medical me-2"></i> Start Check
        </a>
        <a href="{{ url_for('history') }}"
            class="btn btn-light border d-flex align-items-center justify-content-center py-3 text-dark shadow-sm"
            style="font-weight: 600; font-size: 15px; border-radius: 12px;">
            <i class="bi bi-clock-history me-2 text-primary"></i> View History
        </a>
    </div>

    <div class="d-flex justify-content-between mt-3 pt-4 border-top">
        <a href="{{ url_for('language') }}" class="text-muted text-decoration-none"
            style="font-weight: 500; font-size: 14px;">
            <i class="bi bi-translate me-1"></i> Change Language
        </a>
        <a href="{{ url_for('logout') }}" class="text-danger text-decoration-none"
            style="font-weight: 500; font-size: 14px;">
            <i class="bi bi-box-arrow-right me-1"></i> Log Out
        </a>
    </div>
</div>
{% endblock %}
