{% extends 'base.html' %}

{% block title %}Admin Login - HEALTHSCOPE{% endblock %}

{% block content %}
<div class="text-center mb-4">
    <div class="d-inline-flex align-items-center justify-content-center bg-light text-primary rounded-circle mb-3 shadow-sm"
        style="width: 64px; height: 64px;">
        <i class="bi bi-shield-lock-fill fs-2"></i>
    </div>
    <h4 class="page-title mb-1">Admin Portal</h4>
    <p class="text-muted" style="font-size: 14px;">Authorized access only</p>
</div>

<form method="POST" action="{{ url_for('admin_login') }}">
    <div class="mb-4">
        <label for="email" class="form-label">Admin Email</label>
        <div class="input-group">
            <span class="input-group-text bg-light px-3" style="border-radius: 12px 0 0 12px;"><i
                    class="bi bi-person-badge fs-5"></i></span>
            <input type="email" class="form-control border-start-0 ps-1" id="email" name="email"
                placeholder="admin@healthscope.com" required>
        </div>
    </div>

    <div class="mb-4">
        <label for="password" class="form-label">Password</label>
        <div class="input-group">
            <span class="input-group-text bg-light px-3" style="border-radius: 12px 0 0 12px;"><i
                    class="bi bi-lock fs-5"></i></span>
            <input type="password" class="form-control border-start-0 ps-1 password-input" id="password" name="password"
                placeholder="Enter admin password" required>
            <span class="input-group-text toggle-password bg-white pe-3" style="border-radius: 0 12px 12px 0;">
                <i class="bi bi-eye fs-5 text-muted" style="transition: transform 0.2s;"></i>
            </span>
        </div>
    </div>

    <button type="submit" class="btn btn-primary w-100 mb-4 shadow-sm">
        Admin Login <i class="bi bi-box-arrow-in-right ms-1 fs-5 align-middle"></i>
    </button>
</form>

<div class="text-center" style="color: var(--text-muted); font-size: 15px;">
    <a href="{{ url_for('login') }}" class="text-decoration-none">
        <i class="bi bi-arrow-left me-1"></i> Back to User Login
    </a>
</div>
{% endblock %}
